name: Build & Deploy to K8s

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: customer-22

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create secrets
        run: |
          kubectl create secret generic laravel-secret \
            --from-literal=app-key=${{ secrets.LARAVEL_APP_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic db-secret \
            --from-literal=host=${{ secrets.DB_HOST }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }} \
            --from-literal=database=${{ secrets.DB_DATABASE }} \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret docker-registry docker-secret \
            --docker-server=docker.io \
            --docker-username=${{ secrets.DOCKER_USERNAME }} \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to K8s
        run: kubectl apply -f k8s/deployment.yaml

      - name: Wait rollout
        run: kubectl rollout status deployment/customer-app