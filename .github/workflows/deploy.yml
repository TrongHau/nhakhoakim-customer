name: Build & Deploy to K8s

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: testjt1
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull base image
        run: docker pull testjt1/docker-php-his-customer:latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          pull: true
          tags: |
            testjt1/customer-22:latest
            testjt1/customer-22:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3

      - name: Create secrets
        run: |
          kubectl create secret generic laravel-secret \
            --from-literal=app-key=${{ secrets.LARAVEL_APP_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

          kubectl create secret generic db-secret \
            --from-literal=host=${{ secrets.DB_HOST }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }} \
            --from-literal=database=${{ secrets.DB_DATABASE }} \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

          kubectl create secret docker-registry docker-secret \
            --docker-server=docker.io \
            --docker-username=testjt1 \
            --docker-password=${{ secrets.DOCKER_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f - --validate=false

      - name: Deploy to K8s
        run: kubectl apply -f k8s/deployment.yaml --validate=false

      - name: Wait rollout
        run: kubectl rollout status deployment/customer-app